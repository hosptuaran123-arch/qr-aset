<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem QR Aset Hospital Tuaran</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f6fb;
margin:0;
padding:20px;
}

.card{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
color:#005baa;
text-align:center;
}

h2{
text-align:center;
margin-top:-10px;
font-size:18px;
color:#555;
}

.item{
margin:15px 0;
padding:10px;
background:#f7f7f7;
border-radius:8px;
}

.label{
font-weight:bold;
color:#005baa;
}
</style>

</head>

<body>

<div class="card">

<h1>🏥 Hospital Tuaran</h1>

<h2>Sistem Maklumat QR Aset</h2>

<div class="item">
<span class="label">Kod Aset:</span>
<span id="kod"></span>
</div>

<div class="item">
<span class="label">Bahagian:</span>
<span id="bahagian"></span>
</div>

<div class="item">
<span class="label">Lokasi:</span>
<span id="lokasi"></span>
</div>

<div class="item">
<span class="label">Tarikh Penempatan:</span>
<span id="tarikh"></span>
</div>

<div class="item">
<span class="label">Nama Pegawai:</span>
<span id="pegawai"></span>
</div>

<div class="item">
<span class="label">Keterangan Aset:</span>
<span id="keterangan"></span>
</div>
